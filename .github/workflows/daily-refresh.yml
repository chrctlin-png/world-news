name: Daily News Refresh

on:
  schedule:
    # 04:00 UTC = 12:00 Taiwan time (Asia/Taipei, UTC+8)
    - cron: '0 4 * * *'
  workflow_dispatch: {}   # lets you also trigger it manually from the Actions tab

permissions:
  contents: write

jobs:
  refresh:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Refresh news data
        run: node scripts/refresh-news.mjs

      - name: Commit and push if changed
        run: |
          git config user.name "news-bot"
          git config user.email "actions@users.noreply.github.com"
          git add index.html
          git diff --cached --quiet || git commit -m "Auto-refresh news data $(date -u +'%Y-%m-%d %H:%M UTC')"
          git push
